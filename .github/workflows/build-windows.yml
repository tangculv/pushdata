name: Build Desktop Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install pyinstaller

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          .\.venv\Scripts\pyinstaller.exe siyu.spec

      - name: Zip dist
        shell: pwsh
        run: |
          Compress-Archive -Path dist\SiyuETL -DestinationPath siyu-etl-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyu-etl-windows
          path: siyu-etl-windows.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app bundle
        shell: bash
        run: |
          source .venv/bin/activate
          pyinstaller --noconfirm --windowed --name SiyuETL main.py

      - name: Show app architecture
        shell: bash
        run: |
          file dist/SiyuETL.app/Contents/MacOS/SiyuETL || true

      - name: Zip app bundle
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/SiyuETL.app siyu-etl-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyu-etl-macos
          path: siyu-etl-macos.zip
