# Build desktop artifacts for Siyu ETL Client.
# Artifacts:
# - siyu-etl-windows.zip
# - siyu-etl-macos-intel.zip

name: Build Desktop Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          .venv\Scripts\activate
          pyinstaller siyu.spec

      - name: Zip dist
        run: |
          Compress-Archive -Path dist\SiyuETL -DestinationPath siyu-etl-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyu-etl-windows
          path: siyu-etl-windows.zip

  build-macos-intel:
    name: Build macOS Intel
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tkinter support
        run: |
          brew update
          brew install python-tk

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: |
          source .venv/bin/activate
          pyinstaller --noconfirm --windowed --name SiyuETL main.py

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/SiyuETL.app siyu-etl-macos-intel.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyu-etl-macos-intel
          path: siyu-etl-macos-intel.zip
