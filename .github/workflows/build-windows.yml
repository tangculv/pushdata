# Build Windows executable for Siyu ETL Client.
# Run on push to main (or manually); artifact: siyu-etl-windows.zip

name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          .venv\Scripts\activate
          pyinstaller siyu.spec

      - name: Zip dist
        run: |
          Compress-Archive -Path dist\SiyuETL -DestinationPath siyu-etl-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyu-etl-windows
          path: siyu-etl-windows.zip
